<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px -apple-system, system-ui, sans-serif;
        width: 240px;
        margin: 0;
        padding: 14px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      button {
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      #toggle.idle {
        background: #1a73e8;
        color: #fff;
      }
      #toggle.rec {
        background: #d33;
        color: #fff;
      }
      #indicator {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 10px;
      }
      #dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #bbb;
        flex-shrink: 0;
      }
      #dot.rec {
        background: #d33;
        animation: pulse 1.2s ease infinite;
      }
      #state-label {
        font-size: 12px;
        color: #888;
      }
      #state-label.rec {
        color: #d33;
        font-weight: 600;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      #status {
        margin-top: 10px;
        color: #666;
        min-height: 16px;
        font-size: 12px;
      }
      .err {
        color: #d33;
      }
    </style>
  </head>
  <body>
    <h1>t-scriber</h1>
    <div id="indicator">
      <span id="dot"></span>
      <span id="state-label">Not recording</span>
    </div>
    <button id="toggle" class="idle">● Start recording</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
